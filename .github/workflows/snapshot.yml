name: snapshot

on:
  schedule:
    - cron: "17 12 * * *" # 12:17 UTC daily
  workflow_dispatch:

jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run snapshot
        id: snap
        run: |
          set -euo pipefail
          OUT=$(bash scripts/snapshot.sh)
          echo "$OUT"
          echo "$OUT" | node scripts/append.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/snapshots.json; then
            echo "no change"
            exit 0
          fi
          git config user.name "snapshot-bot"
          git config user.email "snapshot-bot@users.noreply.github.com"
          git add data/snapshots.json
          git commit -m "snapshot: $(date -u +%Y-%m-%d)"
          git push
